<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient (Dark) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1333"/>
      <stop offset="50%" stop-color="#150f24"/>
      <stop offset="100%" stop-color="#0d0a17"/>
    </linearGradient>

    <!-- Primary Purple Gradient -->
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Calendar Stroke Gradient -->
    <linearGradient id="calStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Checkmark Gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Glow filter - subtle -->
    <filter id="glowSm" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter - medium -->
    <filter id="glowMd" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter - large (outer aura) -->
    <filter id="glowLg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b1"/>
      <feGaussianBlur stdDeviation="28" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== SQUARE BACKGROUND ===== -->
  <!-- Outer glow aura -->
  <rect x="80" y="80" width="352" height="352" rx="48" fill="url(#purple)" filter="url(#glowLg)" opacity="0.2"/>

  <!-- Main background -->
  <rect x="64" y="64" width="384" height="384" rx="56" fill="url(#bgGrad)" stroke="#2d1f54" stroke-width="2"/>

  <!-- Subtle inner border highlight -->
  <rect x="66" y="66" width="380" height="380" rx="54" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.15"/>

  <!-- ===== CALENDAR ===== -->
  <!-- Calendar body -->
  <rect x="156" y="194" width="200" height="168" rx="18" fill="none" stroke="url(#calStroke)" stroke-width="10" filter="url(#glowSm)"/>

  <!-- Header fill (semi-transparent bar) -->
  <rect x="161" y="194" width="190" height="48" rx="14" fill="url(#purple)" opacity="0.15"/>

  <!-- Header separator line -->
  <line x1="156" y1="242" x2="356" y2="242" stroke="url(#calStroke)" stroke-width="8" filter="url(#glowSm)"/>

  <!-- Calendar binders -->
  <rect x="200" y="148" width="14" height="56" rx="7" fill="url(#calStroke)" filter="url(#glowMd)"/>
  <rect x="298" y="148" width="14" height="56" rx="7" fill="url(#calStroke)" filter="url(#glowMd)"/>
  <!-- Binder highlights -->
  <rect x="204" y="152" width="5" height="48" rx="2.5" fill="#fff" opacity="0.4"/>
  <rect x="302" y="152" width="5" height="48" rx="2.5" fill="#fff" opacity="0.4"/>

  <!-- ===== CHECKMARK ===== -->
  <!-- Glow layer -->
  <path d="M200 296 L242 338 L370 210" fill="none" stroke="url(#checkGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowLg)"/>
  <!-- Solid stroke -->
  <path d="M200 296 L242 338 L370 210" fill="none" stroke="url(#checkGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- White inner core (glass tube effect) -->
  <path d="M200 296 L242 338 L370 210" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>

  <!-- ===== SCHEDULING ARROW ===== -->
  <!-- Glow layer -->
  <path d="M242 362 C 320 400 392 348 372 270" fill="none" stroke="url(#arrowGrad)" stroke-width="16" stroke-linecap="round" filter="url(#glowMd)"/>
  <!-- Solid stroke -->
  <path d="M242 362 C 320 400 392 348 372 270" fill="none" stroke="url(#arrowGrad)" stroke-width="12" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="354,276 372,264 388,290" fill="url(#arrowGrad)" filter="url(#glowMd)"/>
  <polygon points="354,276 372,264 388,290" fill="#ffffff" opacity="0.3"/>
  <!-- Arrow white core -->
  <path d="M242 362 C 320 400 392 348 372 270" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
