<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1528"/>
      <stop offset="50%" stop-color="#120e1e"/>
      <stop offset="100%" stop-color="#090710"/>
    </linearGradient>

    <!-- App Icon Base Glow Gradient -->
    <linearGradient id="appGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d30ff"/>
      <stop offset="100%" stop-color="#5500ff"/>
    </linearGradient>

    <!-- Calendar Glow Gradient -->
    <linearGradient id="calGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8c4bff"/>
      <stop offset="100%" stop-color="#d94bff"/>
    </linearGradient>

    <!-- Checkmark Gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e25dff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>

    <!-- Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4e33ff"/>
      <stop offset="100%" stop-color="#a64bff"/>
    </linearGradient>

    <!-- Filters for Neon Glow -->
    <filter id="glowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowMedium" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowHeavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1"/>
      <feGaussianBlur stdDeviation="30" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background Outer Glow -->
  <rect x="76" y="76" width="360" height="360" rx="80" fill="url(#appGlow)" filter="url(#glowHeavy)" opacity="0.35"/>

  <!-- App Icon Base Background -->
  <rect x="64" y="64" width="384" height="384" rx="85" fill="url(#bgGrad)" stroke="#2b2045" stroke-width="2"/>

  <!-- Calendar Base Shape -->
  <path d="M 160 190 Q 160 160 190 160 L 322 160 Q 352 160 352 190 L 352 322 Q 352 352 322 352 L 190 352 Q 160 352 160 322 Z" fill="none" stroke="url(#calGrad)" stroke-width="12" filter="url(#glowLight)"/>
  
  <!-- Calendar Top Line/Header Separator -->
  <line x1="160" y1="210" x2="352" y2="210" stroke="url(#calGrad)" stroke-width="10" filter="url(#glowLight)"/>

  <!-- Calendar Binders -->
  <rect x="195" y="130" width="14" height="40" rx="7" fill="url(#calGrad)" filter="url(#glowMedium)"/>
  <rect x="303" y="130" width="14" height="40" rx="7" fill="url(#calGrad)" filter="url(#glowMedium)"/>
  <!-- Binder Inner Highlights -->
  <rect x="199" y="134" width="6" height="32" rx="3" fill="#ffffff" opacity="0.6"/>
  <rect x="307" y="134" width="6" height="32" rx="3" fill="#ffffff" opacity="0.6"/>

  <!-- The Checkmark Base Glow -->
  <path d="M 210 270 L 250 310 L 380 180" fill="none" stroke="url(#checkGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowHeavy)"/>
  
  <!-- The Checkmark Solid -->
  <path d="M 210 270 L 250 310 L 380 180" fill="none" stroke="url(#checkGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark inner core (for glass tube effect) -->
  <path d="M 210 270 L 250 310 L 380 180" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- The Arrow Glow -->
  <path d="M 250 340 C 330 380 400 330 380 250" fill="none" stroke="url(#arrowGrad)" stroke-width="18" stroke-linecap="round" filter="url(#glowMedium)"/>
  <!-- The Arrow Solid -->
  <path d="M 250 340 C 330 380 400 330 380 250" fill="none" stroke="url(#arrowGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Arrow Head -->
  <polygon points="360,255 380,245 395,270" fill="url(#arrowGrad)" filter="url(#glowMedium)"/>
  <polygon points="360,255 380,245 395,270" fill="#ffffff" opacity="0.4"/>
  
  <!-- Inner Highlight for Arrow -->
  <path d="M 250 340 C 330 380 400 330 380 250" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

</svg>
