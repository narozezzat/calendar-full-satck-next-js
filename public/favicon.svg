<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1333"/>
      <stop offset="100%" stop-color="#0d0a17"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Checkmark gradient -->
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)" stroke="#2d1f54" stroke-width="1.5"/>

  <!-- Calendar body -->
  <rect x="14" y="20" width="36" height="30" rx="4" fill="none" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>

  <!-- Calendar header bar -->
  <rect x="14" y="20" width="36" height="10" rx="4" fill="url(#accent)" opacity="0.25"/>
  <line x1="14" y1="30" x2="50" y2="30" stroke="url(#accent)" stroke-width="2.5"/>

  <!-- Calendar binders -->
  <rect x="23" y="14" width="4" height="10" rx="2" fill="url(#accent)"/>
  <rect x="37" y="14" width="4" height="10" rx="2" fill="url(#accent)"/>
  <!-- Binder highlights -->
  <rect x="24.5" y="15" width="1.5" height="8" rx="0.75" fill="#fff" opacity="0.5"/>
  <rect x="38.5" y="15" width="1.5" height="8" rx="0.75" fill="#fff" opacity="0.5"/>

  <!-- Checkmark -->
  <path d="M22 39 L30 47 L46 31" fill="none" stroke="url(#check)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Checkmark white core -->
  <path d="M22 39 L30 47 L46 31" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
